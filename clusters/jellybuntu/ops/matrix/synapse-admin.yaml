---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: synapse-admin
  namespace: matrix
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: ops

    controllers:
      main:
        containers:
          app:
            image:
              repository: docker.io/awesometechnologies/synapse-admin
              tag: "0.11.1"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]

    service:
      app:
        controller: main
        ports:
          http:
            port: 8080
