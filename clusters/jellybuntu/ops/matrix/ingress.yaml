  name: synapse-admin
  namespace: matrix
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`synapse-admin.elysium.industries`)
      kind: Rule
      services:
        - name: synapse-admin
          port: 8080
