---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: synapse
  namespace: matrix
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`chat.elysium.industries`)
      kind: Rule
      services:
        - name: synapse
          port: 8008
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
