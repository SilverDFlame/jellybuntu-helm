---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: livekit
  namespace: matrix
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: ops

    controllers:
      main:
        initContainers:
          envsubst:
            image:
              repository: docker.io/library/alpine
              tag: "3.21"
            command:
              - sh
              - -c
              - |
                apk add --no-cache gettext > /dev/null 2>&1
                envsubst < /config-template/livekit.yaml > /config/livekit.yaml
            envFrom:
              - secretRef:
                  name: matrix-secrets
        containers:
          app:
            image:
              repository: docker.io/livekit/livekit-server
              tag: v1.9.9
            args:
              - --config=/config/livekit.yaml
            ports:
              - name: rtc-tcp
                containerPort: 7881
                hostPort: 7881
                protocol: TCP
              - name: rtc-udp-start
                containerPort: 50000
                hostPort: 50000
                protocol: UDP
              - name: rtc-udp-end
                containerPort: 50060
                hostPort: 50060
                protocol: UDP

    service:
      app:
        controller: main
        ports:
          http:
            port: 7880

    persistence:
      config-template:
        type: configMap
        name: livekit-config
        globalMounts:
          - path: /config-template/livekit.yaml
            subPath: livekit.yaml
            readOnly: true
      config:
        type: emptyDir
        globalMounts:
          - path: /config
