---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: livekit
  namespace: matrix
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: ops

    controllers:
      main:
        initContainers:
          envsubst:
            image:
              repository: docker.io/library/alpine
              tag: "3.21"
            command:
              - sh
              - -c
              - |
                apk add --no-cache gettext > /dev/null 2>&1
                envsubst < /config-template/livekit.yaml > /config/livekit.yaml
            envFrom:
              - secretRef:
                  name: matrix-secrets
        containers:
          app:
            image:
              repository: docker.io/livekit/livekit-server
              tag: v1.9.9
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
            args:
              - --config=/config/livekit.yaml
            ports:
              - name: rtc-tcp
                containerPort: 7881
                hostPort: 7881
                protocol: TCP
              - { name: udp-50000, containerPort: 50000, hostPort: 50000, protocol: UDP }
              - { name: udp-50001, containerPort: 50001, hostPort: 50001, protocol: UDP }
              - { name: udp-50002, containerPort: 50002, hostPort: 50002, protocol: UDP }
              - { name: udp-50003, containerPort: 50003, hostPort: 50003, protocol: UDP }
              - { name: udp-50004, containerPort: 50004, hostPort: 50004, protocol: UDP }
              - { name: udp-50005, containerPort: 50005, hostPort: 50005, protocol: UDP }
              - { name: udp-50006, containerPort: 50006, hostPort: 50006, protocol: UDP }
              - { name: udp-50007, containerPort: 50007, hostPort: 50007, protocol: UDP }
              - { name: udp-50008, containerPort: 50008, hostPort: 50008, protocol: UDP }
              - { name: udp-50009, containerPort: 50009, hostPort: 50009, protocol: UDP }
              - { name: udp-50010, containerPort: 50010, hostPort: 50010, protocol: UDP }
              - { name: udp-50011, containerPort: 50011, hostPort: 50011, protocol: UDP }
              - { name: udp-50012, containerPort: 50012, hostPort: 50012, protocol: UDP }
              - { name: udp-50013, containerPort: 50013, hostPort: 50013, protocol: UDP }
              - { name: udp-50014, containerPort: 50014, hostPort: 50014, protocol: UDP }
              - { name: udp-50015, containerPort: 50015, hostPort: 50015, protocol: UDP }
              - { name: udp-50016, containerPort: 50016, hostPort: 50016, protocol: UDP }
              - { name: udp-50017, containerPort: 50017, hostPort: 50017, protocol: UDP }
              - { name: udp-50018, containerPort: 50018, hostPort: 50018, protocol: UDP }
              - { name: udp-50019, containerPort: 50019, hostPort: 50019, protocol: UDP }
              - { name: udp-50020, containerPort: 50020, hostPort: 50020, protocol: UDP }

    service:
      app:
        controller: main
        ports:
          http:
            port: 7880

    persistence:
      config-template:
        type: configMap
        name: livekit-config
        globalMounts:
          - path: /config-template/livekit.yaml
            subPath: livekit.yaml
            readOnly: true
      config:
        type: emptyDir
        globalMounts:
          - path: /config
