---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coturn
  namespace: matrix
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      hostNetwork: true
      nodeSelector:
        jellybuntu.io/role: ops

    controllers:
      main:
        initContainers:
          envsubst:
            image:
              repository: docker.io/library/alpine
              tag: "3.21"
            command:
              - sh
              - -c
              - |
                apk add --no-cache gettext > /dev/null 2>&1
                envsubst < /config-template/turnserver.conf > /config/turnserver.conf
            envFrom:
              - secretRef:
                  name: matrix-secrets
        containers:
          app:
            image:
              repository: docker.io/coturn/coturn
              tag: 4.8.0-r1
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
                add: [NET_BIND_SERVICE]
            args:
              - -c
              - /config/turnserver.conf

    persistence:
      config-template:
        type: configMap
        name: coturn-config
        globalMounts:
          - path: /config-template/turnserver.conf
            subPath: turnserver.conf
            readOnly: true
      config:
        type: emptyDir
        globalMounts:
          - path: /config
