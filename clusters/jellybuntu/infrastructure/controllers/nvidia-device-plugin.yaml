---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
  namespace: kube-system
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1h
  chart:
    spec:
      chart: nvidia-device-plugin
      version: "0.18.2"
      sourceRef:
        kind: HelmRepository
        name: nvidia-device-plugin
        namespace: flux-system
  values:
    # Only deploy on GPU nodes
    nodeSelector:
      jellybuntu.io/role: gpu
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

    # GPU time-slicing: advertise 1 physical GPU as 2
    # Allows Jellyfin and Tdarr pods to share the GTX 1080
    config:
      map:
        default: |-
          version: v1
          sharing:
            timeSlicing:
              resources:
                - name: nvidia.com/gpu
                  replicas: 2
