---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-subdir-external-provisioner
  namespace: nfs-system
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1h
  chart:
    spec:
      chart: nfs-subdir-external-provisioner
      version: "4.0.18"
      sourceRef:
        kind: HelmRepository
        name: nfs-subdir-external-provisioner
        namespace: flux-system
  install:
    createNamespace: true
  values:
    nfs:
      server: "192.168.30.4"
      path: /mnt/k8s-config
    storageClass:
      name: nfs-client
      defaultClass: true
