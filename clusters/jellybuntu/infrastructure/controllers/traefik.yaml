---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik-system
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1m
  chart:
    spec:
      chart: traefik
      version: "39.0.5"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  install:
    createNamespace: true
  values:
    nodeSelector:
      jellybuntu.io/role: net

    service:
      type: LoadBalancer
      spec:
        externalTrafficPolicy: Local

    ports:
      web:
        port: 8000
        exposedPort: 80
        protocol: TCP
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
      websecure:
        port: 8443
        exposedPort: 443
        protocol: TCP
        http:
          tls:
            enabled: true
            certResolver: letsencrypt
            domains:
              - main: "elysium.industries"
                sans:
                  - "*.elysium.industries"

    # ACME certificate resolver (Let's Encrypt + Cloudflare DNS-01)
    certificatesResolvers:
      letsencrypt:
        acme:
          email: "admin@elysium.industries"
          storage: /data/acme.json
          caServer: "https://acme-v02.api.letsencrypt.org/directory"
          dnsChallenge:
            provider: cloudflare
            resolvers:
              - "1.1.1.1:53"
              - "8.8.8.8:53"

    # Cloudflare API token from secret
    envFrom:
      - secretRef:
          name: traefik-cloudflare

    # Persist ACME certificates across restarts
    persistence:
      enabled: true
      name: data
      accessMode: ReadWriteOnce
      size: 128Mi
      storageClass: nfs-client
      path: /data

    # Init container to set acme.json permissions (required by Traefik)
    deployment:
      initContainers:
        - name: volume-permissions
          image: docker.io/library/busybox:1.37
          command: ["sh", "-c", "touch /data/acme.json && chmod 600 /data/acme.json"]
          volumeMounts:
            - mountPath: /data
              name: data

    # TLS options
    tlsOptions:
      default:
        minVersion: VersionTLS12