---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/jellybuntu/infrastructure
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  prune: true
