---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: gpu
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: gpu
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

    controllers:
      main:
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/jellyfin
              tag: "latest"
            env:
              PUID: "1000"
              PGID: "1000"
              TZ: "America/Los_Angeles"
              JELLYFIN_PublishedServerUrl: "jellyfin.elysium.industries"
            resources:
              requests:
                memory: 2Gi
                nvidia.com/gpu: "1"
              limits:
                memory: 6Gi
                nvidia.com/gpu: "1"

    service:
      app:
        controller: main
        ports:
          http:
            port: 8096

    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: nfs-client
        globalMounts:
          - path: /config
      media:
        type: persistentVolumeClaim
        existingClaim: nfs-media-gpu
        globalMounts:
          - path: /data
      transcode-cache:
        type: hostPath
        hostPath: /mnt/transcode-cache/jellyfin
        globalMounts:
          - path: /config/data/transcodes
