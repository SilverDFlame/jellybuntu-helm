---
# Single container with internal node (ghcr.io/haveagitgat/tdarr includes both
# server and node). Using internalNode=true avoids the startup race condition
# that occurs with separate tdarr + tdarr_node containers in the same pod.
# See: https://github.com/truecharts/charts/blob/master/charts/stable/tdarr/values.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tdarr
  namespace: gpu
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: gpu
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

    controllers:
      main:
        containers:
          app:
            image:
              repository: ghcr.io/haveagitgat/tdarr
              tag: "2.58.02"
            env:
              TZ: "America/Los_Angeles"
              serverIP: "0.0.0.0"
              serverPort: "8266"
              webUIPort: "8265"
              internalNode: "true"
              nodeName: "K8sNode"
            resources:
              requests:
                memory: 4Gi
                nvidia.com/gpu: "1"
              limits:
                memory: 8Gi
                nvidia.com/gpu: "1"

    service:
      app:
        controller: main
        ports:
          webui:
            port: 8265
          server:
            port: 8266

    persistence:
      server-data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 2Gi
        storageClass: nfs-client
        globalMounts:
          - path: /app/server
      configs:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: nfs-client
        globalMounts:
          - path: /app/configs
      media:
        type: persistentVolumeClaim
        existingClaim: nfs-media-gpu
        globalMounts:
          - path: /data
      transcode-cache:
        type: hostPath
        hostPath: /mnt/transcode-cache/tdarr
        globalMounts:
          - path: /temp
