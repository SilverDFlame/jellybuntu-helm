---
# Tdarr container filesystem layout (verified from running container):
#   /app/Tdarr_Server/ — server binary (DO NOT mount over)
#   /app/Tdarr_Node/   — node binary (DO NOT mount over)
#   /app/server/       — server runtime data (Tdarr/ subdir with DB2, Plugins, etc.)
#   /app/configs/      — shared config JSONs
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tdarr
  namespace: gpu
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: gpu
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

    controllers:
      main:
        containers:
          server:
            image:
              repository: ghcr.io/haveagitgat/tdarr
              tag: "2.58.02"
            env:
              TZ: "America/Los_Angeles"
              serverIP: "0.0.0.0"
              serverPort: "8266"
              webUIPort: "8265"
              internalNode: "false"
              nodeName: "K8sNode"
            resources:
              requests:
                memory: 512Mi
              limits:
                memory: 1Gi

          node:
            image:
              repository: ghcr.io/haveagitgat/tdarr_node
              tag: "2.58.02"
            env:
              TZ: "America/Los_Angeles"
              serverIP: "localhost"
              serverPort: "8266"
              nodeName: "K8sNode"
            resources:
              requests:
                memory: 4Gi
                nvidia.com/gpu: "1"
              limits:
                memory: 8Gi
                nvidia.com/gpu: "1"

    service:
      app:
        controller: main
        ports:
          webui:
            port: 8265
          server:
            port: 8266

    persistence:
      server-data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 2Gi
        storageClass: nfs-client
        advancedMounts:
          main:
            server:
              - path: /app/server
      configs:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: nfs-client
        advancedMounts:
          main:
            server:
              - path: /app/configs
            node:
              - path: /app/configs
      media:
        type: persistentVolumeClaim
        existingClaim: nfs-media-gpu
        globalMounts:
          - path: /data
      transcode-cache:
        type: hostPath
        hostPath: /mnt/transcode-cache/tdarr
        globalMounts:
          - path: /temp
