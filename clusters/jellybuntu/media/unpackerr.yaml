---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unpackerr
  namespace: media
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: media

    controllers:
      main:
        containers:
          app:
            image:
              repository: docker.io/golift/unpackerr
              tag: "0.14.5"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
            env:
              # Logging
              UN_LOG_FILE: ""
              UN_LOG_FILES: "0"
              UN_DEBUG: "false"
              # Intervals
              UN_INTERVAL: "2m"
              UN_START_DELAY: "1m"
              UN_RETRY_DELAY: "5m"
              UN_MAX_RETRIES: "3"
              # Parallel extractions
              UN_PARALLEL: "1"
              # File modes
              UN_FILE_MODE: "0644"
              UN_DIR_MODE: "0755"
              # Sonarr
              UN_SONARR_0_URL: "http://sonarr.media.svc.cluster.local:8989"
              UN_SONARR_0_PATHS_0: "/data/torrents/tv-sonarr"
              UN_SONARR_0_PATHS_1: "/data/usenet/tv"
              UN_SONARR_0_PROTOCOLS: "torrent,usenet"
              UN_SONARR_0_TIMEOUT: "10s"
              UN_SONARR_0_DELETE_ORIG: "false"
              UN_SONARR_0_DELETE_DELAY: "5m"
              # Radarr
              UN_RADARR_0_URL: "http://radarr.media.svc.cluster.local:7878"
              UN_RADARR_0_PATHS_0: "/data/torrents/radarr"
              UN_RADARR_0_PATHS_1: "/data/usenet/movies"
              UN_RADARR_0_PROTOCOLS: "torrent,usenet"
              UN_RADARR_0_TIMEOUT: "10s"
              UN_RADARR_0_DELETE_ORIG: "false"
              UN_RADARR_0_DELETE_DELAY: "5m"
              # Lidarr
              UN_LIDARR_0_URL: "http://lidarr.media.svc.cluster.local:8686"
              UN_LIDARR_0_PATHS_0: "/data/torrents/music"
              UN_LIDARR_0_PATHS_1: "/data/usenet/music"
              UN_LIDARR_0_PROTOCOLS: "torrent,usenet"
              UN_LIDARR_0_TIMEOUT: "10s"
              UN_LIDARR_0_DELETE_ORIG: "false"
              UN_LIDARR_0_DELETE_DELAY: "5m"
              # API keys (from media-secrets)
              UN_SONARR_0_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: media-secrets
                    key: SONARR_API_KEY
              UN_RADARR_0_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: media-secrets
                    key: RADARR_API_KEY
              UN_LIDARR_0_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: media-secrets
                    key: LIDARR_API_KEY
            resources:
              requests:
                memory: 256Mi
              limits:
                memory: 512Mi

    persistence:
      media:
        type: persistentVolumeClaim
        existingClaim: nfs-media
        globalMounts:
          - path: /data
