---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyseerr
  namespace: media
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: media

    controllers:
      main:
        containers:
          app:
            image:
              repository: docker.io/fallenbagel/jellyseerr
              tag: "2.7.3"
            env:
              LOG_LEVEL: info
              TZ: America/Chicago
            resources:
              requests:
                memory: 256Mi
              limits:
                memory: 512Mi

    service:
      app:
        controller: main
        ports:
          http:
            port: 5055

    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClassName: nfs-client
        globalMounts:
          - path: /app/config
