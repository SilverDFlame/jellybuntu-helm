---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-media
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  storageClassName: ""
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.30.15
    path: /mnt/storage/data
  mountOptions:
    - hard
    - nfsvers=4
    - noexec
    - nosuid
