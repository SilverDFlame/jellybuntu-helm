---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
  namespace: media
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: media

    controllers:
      main:
        initContainers:
          init-config:
            image:
              repository: docker.io/library/busybox
              tag: "1.37"
            command:
              - sh
              - -c
              - |
                if [ ! -f /config/config.xml ]; then
                  cat > /config/config.xml <<XMLEOF
                <Config>
                  <PostgresUser>radarr</PostgresUser>
                  <PostgresPassword>${MEDIA_POSTGRES_PASSWORD}</PostgresPassword>
                  <PostgresHost>192.168.30.16</PostgresHost>
                  <PostgresPort>5432</PostgresPort>
                  <PostgresMainDb>radarr_main</PostgresMainDb>
                  <PostgresLogDb>radarr_log</PostgresLogDb>
                </Config>
                XMLEOF
                fi
            envFrom:
              - secretRef:
                  name: media-secrets
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/radarr
              tag: latest
            env:
              PUID: "1000"
              PGID: "1000"
              TZ: America/Chicago
            envFrom:
              - secretRef:
                  name: media-secrets
            resources:
              requests:
                memory: 512Mi
              limits:
                memory: 1Gi

    service:
      app:
        controller: main
        ports:
          http:
            port: 7878

    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClassName: nfs-client
        globalMounts:
          - path: /config
      media:
        type: persistentVolumeClaim
        existingClaim: nfs-media
        globalMounts:
          - path: /data
