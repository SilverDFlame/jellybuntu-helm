---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prowlarr
  namespace: media
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: media

    controllers:
      main:
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/prowlarr
              tag: latest
            env:
              PUID: "1000"
              PGID: "1000"
              TZ: America/Chicago
              MEDIA_POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: media-secrets
                    key: MEDIA_POSTGRES_PASSWORD
              PROWLARR_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: media-secrets
                    key: PROWLARR_API_KEY
            resources:
              requests:
                memory: 256Mi
              limits:
                memory: 512Mi

    service:
      app:
        controller: main
        ports:
          http:
            port: 9696

    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: nfs-client
        globalMounts:
          - path: /config
      init-scripts:
        type: configMap
        name: prowlarr-init
        defaultMode: 0755
        globalMounts:
          - path: /custom-cont-init.d/postgres-config.sh
            subPath: postgres-config.sh
            readOnly: true
