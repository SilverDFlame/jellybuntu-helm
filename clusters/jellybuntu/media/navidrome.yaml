---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: navidrome
  namespace: media
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: media

    controllers:
      main:
        containers:
          app:
            image:
              repository: ghcr.io/navidrome/navidrome
              tag: "0.60.3"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
            env:
              ND_SCANSCHEDULE: "1h"
              ND_LOGLEVEL: info
              ND_SESSIONTIMEOUT: "24h"
              ND_BASEURL: ""
              ND_ENABLETRANSCODINGCONFIG: "true"
            resources:
              requests:
                memory: 128Mi
              limits:
                memory: 256Mi

    service:
      app:
        controller: main
        ports:
          http:
            port: 4533

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: nfs-client
        globalMounts:
          - path: /data
      music:
        type: persistentVolumeClaim
        existingClaim: nfs-media
        globalMounts:
          - path: /music
            subPath: media/music
            readOnly: true
