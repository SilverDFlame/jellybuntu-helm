---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sabnzbd
  namespace: media
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: media

    controllers:
      main:
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/sabnzbd
              tag: latest
            env:
              PUID: "1000"
              PGID: "1000"
              TZ: America/Chicago
              SABNZBD_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: media-secrets
                    key: SABNZBD_API_KEY
              SERVICES_ADMIN_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: media-secrets
                    key: SERVICES_ADMIN_PASSWORD
              NEWSHOSTING_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: media-secrets
                    key: NEWSHOSTING_USERNAME
              NEWSHOSTING_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: media-secrets
                    key: NEWSHOSTING_PASSWORD
              NEWSHOSTING_CONNECTIONS:
                valueFrom:
                  secretKeyRef:
                    name: media-secrets
                    key: NEWSHOSTING_CONNECTIONS
              GIGANEWS_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: media-secrets
                    key: GIGANEWS_USERNAME
              GIGANEWS_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: media-secrets
                    key: GIGANEWS_PASSWORD
              GIGANEWS_CONNECTIONS:
                valueFrom:
                  secretKeyRef:
                    name: media-secrets
                    key: GIGANEWS_CONNECTIONS
            resources:
              requests:
                memory: 1Gi
              limits:
                memory: 2Gi

    service:
      app:
        controller: main
        ports:
          http:
            port: 8080

    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: nfs-client
        globalMounts:
          - path: /config
      media:
        type: persistentVolumeClaim
        existingClaim: nfs-media
        globalMounts:
          - path: /data
      init-scripts:
        type: configMap
        name: sabnzbd-init
        defaultMode: 0755
        globalMounts:
          - path: /custom-cont-init.d/patch-config.sh
            subPath: patch-config.sh
            readOnly: true
          - path: /custom-cont-init.d/configure-api.sh
            subPath: configure-api.sh
            readOnly: true
