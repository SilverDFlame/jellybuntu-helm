---
apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
  namespace: media
  labels:
    app.kubernetes.io/part-of: jellybuntu
data:
  recyclarr.yml: |
    ---
    # Recyclarr Configuration
    # Based on TRaSH Guides: https://trash-guides.info/

    sonarr:
      web-2160p-1080p:
        base_url: http://sonarr.media.svc.cluster.local:8989
        api_key: !env_var SONARR_API_KEY

        # Quality Definition
        quality_definition:
          type: series

        # Quality Profiles
        quality_profiles:
          - name: WEB-2160p + 1080p
            reset_unmatched_scores:
              enabled: true
            upgrade:
              allowed: true
              until_quality: Bluray-2160p
              until_score: 10000
            min_format_score: 0
            quality_sort: top
            qualities:
              - name: Bluray-2160p
              - name: WEB 2160p
                qualities:
                  - WEBDL-2160p
                  - WEBRip-2160p
              - name: HDTV-2160p
              - name: Bluray-1080p
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: HDTV-1080p

        # Custom Formats
        custom_formats:
          # WEB Tier Release Groups
          - trash_ids:
              - e6258996055b9fbab7e9cb2f75819294 # WEB Tier 01
              - 58790d4e2fdcd9733aa7ae68ba2bb503 # WEB Tier 02
              - d84935abd3f8556dcd51d4f27e22d0a6 # WEB Tier 03
            assign_scores_to:
              - name: WEB-2160p + 1080p
                score: 1700

          # Unwanted
          - trash_ids:
              - 85c61753df5da1fb2aab6f2a47426b09 # BR-DISK
              - 9c11cd3f07101cdba90a2d81cf0e56b4 # LQ
            assign_scores_to:
              - name: WEB-2160p + 1080p
                score: -10000

          # Misc
          - trash_ids:
              - eb3d5cc0a2be0db205fb823640db6a3c # Repack/Proper
              - 44e7c4de10ae50265753082e5dc76047 # Repack2
            assign_scores_to:
              - name: WEB-2160p + 1080p
                score: 5

    radarr:
      uhd-bluray-web:
        base_url: http://radarr.media.svc.cluster.local:7878
        api_key: !env_var RADARR_API_KEY

        # Quality Definition
        quality_definition:
          type: movie
          preferred_ratio: 0.5

        # Quality Profiles
        quality_profiles:
          - name: UHD Bluray + WEB
            reset_unmatched_scores:
              enabled: true
            upgrade:
              allowed: true
              until_quality: Bluray-2160p
              until_score: 10000
            min_format_score: 0
            quality_sort: top
            qualities:
              - name: Bluray-2160p
              - name: WEB 2160p
                qualities:
                  - WEBDL-2160p
                  - WEBRip-2160p
              - name: Bluray-1080p
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p

        # Custom Formats
        custom_formats:
          # HDR Formats
          - trash_ids:
              - 493b6d1dbec3c3364c59d7607f7e3405 # HDR
              - 923b6abef9b17f937fab56cfcf89e1f1 # DV (w/o HDR fallback)
              - f700d29429c023a5734505e77daeaea7 # DV (Disk)
              - b337d6812e06c200ec9a2d3cfa9d20a7 # DV-Boost
              - caa37d0df9c348912df1fb1d88f9273a # HDR10Plus Boost
            assign_scores_to:
              - name: UHD Bluray + WEB
                score: 600

          # Movie Versions
          - trash_ids:
              - 9f6cbff8cfe4ebbc1bde14c7b7bec0de # IMAX Enhanced
              - 09d9dd29a0fc958f9796e65c2a8864b4 # IMAX (Open Matte)
            assign_scores_to:
              - name: UHD Bluray + WEB
                score: 800

          # HQ Release Groups
          - trash_ids:
              - 4d74ac4c4db0b64bff6ce0cffef99bf0 # UHD Bluray Tier 01
              - a58f517a70193f8e578056642178419d # UHD Bluray Tier 02
              - e71939fae578037e7aed3ee219bbe7c1 # UHD Bluray Tier 03
            assign_scores_to:
              - name: UHD Bluray + WEB
                score: 1800

          # WEB Tier
          - trash_ids:
              - c20f169ef63c5f40c2def54abaf4438e # WEB Tier 01
              - 403816d65392c79236dcb6dd591aeda4 # WEB Tier 02
              - af94e0fe497124d1f9ce732069ec8c3b # WEB Tier 03
            assign_scores_to:
              - name: UHD Bluray + WEB
                score: 1700

          # Unwanted
          - trash_ids:
              - b8cd450cbfa689c0259a01d9e29ba3d6 # 3D
              - e204b80c87be9497a8a6eaff48f72905 # LQ (Release Title)
              - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
              - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
              - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
              - f537cf427b64c38c8e36298f657e4828 # Scene
            assign_scores_to:
              - name: UHD Bluray + WEB
                score: -10000

          # Misc
          - trash_ids:
              - e7718d7a3ce595f289bfee26adc178f5 # Repack/Proper
              - ae43b294509409a6a13919dedd4764c4 # Repack2
            assign_scores_to:
              - name: UHD Bluray + WEB
                score: 5

          # Streaming Services
          - trash_ids:
              - b3b3a6ac74ecbd56bcdbefa4799fb9df # AMZN
              - 40e9380490e748672c2522eaaeb692f7 # ATVP
              - f6ff65b3f4b464a79dcc75950fe20382 # CRAV
              - 84272245b2988854bfb76a16e60baea5 # DSNP
              - 509e5f41146e278f9eab1ddaceb34515 # HBO
              - 5763d1b0ce84aff3b21038eea8e9b8ad # HMAX
              - 526d445d4c16214309f0fd2b3be18a89 # Hulu
              - 2a6039655313bf5dab1e43523b62c374 # MA
              - 6a061313d22e51e0f25b7cd4dc065233 # MAX
              - 170b1d363bd8516fbf3a3eb05d4faff6 # NF
              - c9fd353f8f5f1baf56dc601c4cb29920 # PCOK
              - e36a0ba1bc902b26ee40818a1d59b8bd # PMTP
            assign_scores_to:
              - name: UHD Bluray + WEB
                score: 0
