---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
  namespace: media
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: media

    controllers:
      main:
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/sonarr
              tag: latest
            env:
              PUID: "1000"
              PGID: "1000"
              TZ: America/Chicago
            envFrom:
              - secretRef:
                  name: media-secrets
            resources:
              requests:
                memory: 512Mi
              limits:
                memory: 1Gi

    service:
      app:
        controller: main
        ports:
          http:
            port: 8989

    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClassName: nfs-client
        globalMounts:
          - path: /config
      media:
        type: persistentVolumeClaim
        existingClaim: nfs-media
        globalMounts:
          - path: /data
