---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: media

    controllers:
      main:
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/qbittorrent
              tag: latest
            env:
              PUID: "1000"
              PGID: "1000"
              TZ: America/Chicago
              WEBUI_PORT: "8080"
              SERVICES_ADMIN_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: media-secrets
                    key: SERVICES_ADMIN_PASSWORD
            resources:
              requests:
                memory: 1Gi
              limits:
                memory: 2Gi
          gluetun:
            image:
              repository: docker.io/qmcgaw/gluetun
              tag: v3.41.0
            env:
              VPN_SERVICE_PROVIDER: "private internet access"
              VPN_TYPE: openvpn
              VPN_PORT_FORWARDING: "on"
              VPN_PORT_FORWARDING_PROVIDER: "private internet access"
              FIREWALL_OUTBOUND_SUBNETS: "10.42.0.0/16,10.43.0.0/16,192.168.30.0/24,100.64.0.0/10"
              FIREWALL_INPUT_PORTS: "8080"
              DOT: "off"
              UPDATER_PERIOD: "24h"
              LOG_LEVEL: info
            envFrom:
              - secretRef:
                  name: vpn-credentials
            securityContext:
              capabilities:
                add:
                  - NET_ADMIN
          port-sync:
            image:
              repository: docker.io/library/alpine
              tag: "3.21"
            command:
              - /bin/sh
              - -c
              - apk add --no-cache inotify-tools >/dev/null 2>&1 && exec /scripts/port-sync.sh
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi

    service:
      app:
        controller: main
        ports:
          http:
            port: 8080

    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: nfs-client
        advancedMounts:
          main:
            app:
              - path: /config
      gluetun-data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 256Mi
        storageClass: nfs-client
        advancedMounts:
          main:
            gluetun:
              - path: /gluetun
      media:
        type: persistentVolumeClaim
        existingClaim: nfs-media
        advancedMounts:
          main:
            app:
              - path: /data
      gluetun-tmp:
        type: emptyDir
        advancedMounts:
          main:
            gluetun:
              - path: /tmp/gluetun
            port-sync:
              - path: /tmp/gluetun
                readOnly: true
      tun:
        type: hostPath
        hostPath: /dev/net/tun
        advancedMounts:
          main:
            gluetun:
              - path: /dev/net/tun
      init-scripts:
        type: configMap
        name: qbittorrent-init
        defaultMode: 0755
        advancedMounts:
          main:
            app:
              - path: /custom-cont-init.d/patch-config.sh
                subPath: patch-config.sh
                readOnly: true
              - path: /custom-cont-init.d/set-password.sh
                subPath: set-password.sh
                readOnly: true
            port-sync:
              - path: /scripts/port-sync.sh
                subPath: port-sync.sh
                readOnly: true
