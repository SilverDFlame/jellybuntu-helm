---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: recyclarr
  namespace: media
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: media

    controllers:
      main:
        type: cronjob
        cronjob:
          schedule: "0 4 * * *"
        initContainers:
          fix-git-ownership:
            image:
              repository: docker.io/library/alpine
              tag: "3.21"
            command:
              - sh
              - -c
              - |
                apk add --no-cache git >/dev/null 2>&1
                git config --global --add safe.directory '*'
                cp ~/.gitconfig /config/.gitconfig 2>/dev/null || true
        containers:
          app:
            image:
              repository: docker.io/recyclarr/recyclarr
              tag: "7.5.2"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
            args:
              - sync
            env:
              TZ: America/Chicago
              HOME: /config
              GIT_CONFIG_GLOBAL: /config/.gitconfig
            envFrom:
              - secretRef:
                  name: media-secrets

    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 256Mi
        storageClass: nfs-client
        globalMounts:
          - path: /config
      recyclarr-config:
        type: configMap
        name: recyclarr-config
        globalMounts:
          - path: /config/recyclarr.yml
            subPath: recyclarr.yml
            readOnly: true
