---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: recyclarr
  namespace: media
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: media

    controllers:
      main:
        type: cronjob
        cronjob:
          schedule: "0 4 * * *"
          successfulJobsHistoryLimit: 1
          failedJobsHistoryLimit: 1
        containers:
          app:
            image:
              repository: docker.io/recyclarr/recyclarr
              tag: "7.5.2"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
            args:
              - sync
            env:
              TZ: America/Chicago
            envFrom:
              - secretRef:
                  name: media-secrets

    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 256Mi
        storageClass: nfs-client
        globalMounts:
          - path: /config
      recyclarr-config:
        type: configMap
        name: recyclarr-config
        globalMounts:
          - path: /config/recyclarr.yml
            subPath: recyclarr.yml
            readOnly: true
