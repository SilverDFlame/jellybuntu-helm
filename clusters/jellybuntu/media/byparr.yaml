---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: byparr
  namespace: media
  labels:
    app.kubernetes.io/part-of: jellybuntu
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      nodeSelector:
        jellybuntu.io/role: media

    controllers:
      main:
        containers:
          app:
            image:
              repository: ghcr.io/thephaseless/byparr
              tag: "2.1.0"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
            env:
              LOG_LEVEL: info
            resources:
              requests:
                memory: 768Mi
              limits:
                memory: 1536Mi

    service:
      app:
        controller: main
        ports:
          http:
            port: 8191

    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClassName: nfs-client
        globalMounts:
          - path: /config
